name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}
  APP_UUID: jw4kpfn8utdybrmwkr80fm8f
  SERVER_IP: 78.157.51.14

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # برای ساخت GitHub Release
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build روی GitHub (اینترنت stable) و push به GHCR ──
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # build-push-action فقط push می‌کند؛ برای docker save باید pull کنیم
      - name: Pull image to local daemon
        run: docker pull ${{ env.IMAGE }}:latest

      # ── Upload image to GitHub Release, server pulls with token (no third-party needed) ──
      # Secrets needed:
      #   IMAGE_UPLOAD_TOKEN  — token for the image receiver on port 5001
      #   COOLIFY_TOKEN       — value: 5|beewaz-deploy-fix-2026
      # GITHUB_TOKEN is auto-provided (needs contents:write permission above)
      - name: Transfer image to server
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ارزش token رو در لاگ مخفی کن
          echo "::add-mask::$GH_TOKEN"

          IMAGE="${{ env.IMAGE }}:latest"
          echo "=== Saving image to tar.gz ==="
          docker save "$IMAGE" | gzip > /tmp/beewaz-image.tar.gz
          echo "Compressed size: $(($(stat -c%s /tmp/beewaz-image.tar.gz) / 1024 / 1024)) MB"

          echo "=== Uploading to GitHub Release (stays inside GitHub, no third-party) ==="
          gh release create deploy-cache --title "Deploy Cache" --prerelease \
            --notes "Auto-generated by CI – safe to delete" 2>/dev/null || true
          gh release upload deploy-cache /tmp/beewaz-image.tar.gz --clobber
          ASSET_URL="https://github.com/${{ github.repository }}/releases/download/deploy-cache/beewaz-image.tar.gz"
          echo "Asset uploaded: $ASSET_URL"

          echo "=== Telling server to pull (outbound from Iran → GitHub CDN = reliable) ==="
          ENC_URL=$(node -e "console.log(encodeURIComponent('$ASSET_URL'))")
          ENC_TOK=$(node -e "console.log(encodeURIComponent('$GH_TOKEN'))")
          HTTP_CODE=$(curl -s -o /tmp/pull-resp.txt -w '%{http_code}' \
            -X POST \
            -H "X-Upload-Token: ${{ secrets.IMAGE_UPLOAD_TOKEN }}" \
            "https://bz360.ir/api/upload/pull?url=${ENC_URL}&gh_token=${ENC_TOK}" \
            --max-time 30 -k)
          echo "HTTP $HTTP_CODE — $(cat /tmp/pull-resp.txt)"
          [ "$HTTP_CODE" = "202" ] || { echo "Pull trigger failed!"; exit 1; }

          echo "=== Waiting for server to download + docker load ==="
          for i in $(seq 1 120); do
            STAT=$(curl -sk "https://bz360.ir/api/upload/status" \
              -H "X-Upload-Token: ${{ secrets.IMAGE_UPLOAD_TOKEN }}" --max-time 10 2>/dev/null || echo "error: unreachable")
            echo "  [$i] $STAT"
            if echo "$STAT" | grep -q "^done:"; then break; fi
            if echo "$STAT" | grep -q "^error:"; then echo "docker load failed!"; exit 1; fi
            sleep 10
          done

      - name: Trigger Coolify deploy
        run: |
          echo "=== Triggering deploy via Coolify API ==="
          HTTP_CODE=$(curl -s -o /tmp/deploy-resp.json -w '%{http_code}' \
            -X POST \
            "http://${{ env.SERVER_IP }}:8000/api/v1/applications/${{ env.APP_UUID }}/start" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "HTTP $HTTP_CODE — $(cat /tmp/deploy-resp.json)"
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || { echo "Deploy trigger failed!"; exit 1; }
          echo "Deploy queued successfully"

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/${{ github.repository }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://bz360.ir |" >> $GITHUB_STEP_SUMMARY
