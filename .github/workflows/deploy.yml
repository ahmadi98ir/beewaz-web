name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── مرحله ۱: تست ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── مرحله ۲: Build + Deploy (فقط main) ───────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://bz360.ir \
            -t beewaz-web:latest \
            .
          docker save beewaz-web:latest | gzip > beewaz-image.tar.gz
          SIZE=$(du -sh beewaz-image.tar.gz | cut -f1)
          echo "IMAGE_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Docker image size: $SIZE"
          ls -lh beewaz-image.tar.gz

      - name: Test SSH connectivity
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          echo "Testing SSH to ${{ secrets.SSH_HOST }}:${{ secrets.SSH_PORT }}..."
          sshpass -p '${{ secrets.SSH_PASS }}' ssh \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            -p ${{ secrets.SSH_PORT }} \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "echo '✅ SSH_OK' && uname -a" || echo "❌ SSH_FAILED"

      - name: Upload image to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          source: "beewaz-image.tar.gz"
          target: /tmp/

      - name: Load image & restart via Coolify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            set -e
            docker load < /tmp/beewaz-image.tar.gz
            rm -f /tmp/beewaz-image.tar.gz

            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8000/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}/restart \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              -H "Content-Type: application/json" \
              --max-time 15 || echo "000")

            if [ "$HTTP" = "200" ] || [ "$HTTP" = "202" ]; then
              echo "✅ Coolify restart triggered"
            else
              CONTAINER=$(docker ps --format "{{.Names}}" | grep -i beewaz | head -1)
              [ -n "$CONTAINER" ] && docker restart "$CONTAINER" && echo "✅ Container restarted" || exit 1
            fi

      - name: Health check
        run: |
          sleep 45
          HTTP=$(curl -sf --max-time 15 -o /dev/null -w '%{http_code}' https://bz360.ir/ || echo "000")
          echo "Site returned HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
            echo "## ✅ Deploy موفق — commit \`${GITHUB_SHA:0:8}\` | image ${{ env.IMAGE_SIZE }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Health check failed (HTTP $HTTP)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
