name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: false
          load: true
          tags: beewaz-web:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save & compress Docker image
        run: |
          docker save beewaz-web:latest | gzip -1 > /tmp/beewaz-web.tar.gz
          SIZE=$(du -sh /tmp/beewaz-web.tar.gz | cut -f1)
          echo "Compressed size: $SIZE"

      - name: Delete previous release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/docker-latest --jq .id 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            gh api --method DELETE repos/${{ github.repository }}/releases/$RELEASE_ID || true
          fi
          git push origin :refs/tags/docker-latest 2>/dev/null || true

      - name: Create release and upload image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:8}"
          gh release create docker-latest \
            --title "Docker image (latest) — $SHORT_SHA" \
            --notes "Commit: ${{ github.sha }}" \
            --target ${{ github.sha }} \
            /tmp/beewaz-web.tar.gz#beewaz-web.tar.gz
          echo "::notice ::Image ready: https://github.com/${{ github.repository }}/releases/download/docker-latest/beewaz-web.tar.gz"

      - name: Deploy via SSH (port 8443)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8443
          timeout: 30s
          command_timeout: 2m
          script: |
            echo "=== Triggering Coolify deploy from localhost ==="
            # Try Coolify internal port first (8000), then 80 via localhost
            for PORT in 8000 80 3000; do
              HTTP=$(curl -s -o /tmp/cr.txt -w "%{http_code}" \
                "http://127.0.0.1:${PORT}/api/v1/deploy?uuid=ai1rr235nbzmyyvd6nuxaynd&force=false" \
                -H "Authorization: Bearer 5|wmPEJblDJiNLZSTVjaWVkU8hplMJjunnQsG30tVw2b19f363" \
                -H "Accept: application/json" --max-time 15 2>/dev/null)
              echo "Port $PORT → HTTP $HTTP: $(cat /tmp/cr.txt 2>/dev/null)"
              if [ "$HTTP" = "200" ]; then
                echo "Deploy queued on port $PORT!"
                exit 0
              fi
            done
            echo "All ports tried. Check Coolify UI at http://cool.rpim.ir"

      - name: Deploy summary
        if: always()
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Docker image**: [beewaz-web.tar.gz](https://github.com/${{ github.repository }}/releases/download/docker-latest/beewaz-web.tar.gz)" >> $GITHUB_STEP_SUMMARY
          echo "- **Site**: https://bz360.ir" >> $GITHUB_STEP_SUMMARY
          echo "- **Admin**: https://bz360.ir/admin" >> $GITHUB_STEP_SUMMARY
