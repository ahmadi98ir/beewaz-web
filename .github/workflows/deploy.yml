name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: false
          load: true
          tags: beewaz-web:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH & Test connection
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key

          # Test SSH connectivity first
          echo "=== Testing SSH connection ==="
          ssh -i ~/.ssh/server_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=20 \
              -o BatchMode=yes \
              -p 8443 \
              root@78.157.51.14 \
              "echo SSH_OK && docker --version" 2>&1
          echo "SSH test exit code: $?"

      - name: Transfer image to server via SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          printf '%s\n' "$SSH_KEY" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key

          IMAGE_SIZE=$(docker image inspect beewaz-web:latest --format='{{.Size}}' | numfmt --to=iec 2>/dev/null || echo "unknown")
          echo "=== Transferring image (raw: $IMAGE_SIZE) ==="

          docker save beewaz-web:latest | gzip | \
            ssh -i ~/.ssh/server_key \
                -o StrictHostKeyChecking=no \
                -o ServerAliveInterval=30 \
                -o ServerAliveCountMax=30 \
                -o ConnectTimeout=30 \
                -o TCPKeepAlive=yes \
                -p 8443 \
                root@78.157.51.14 \
                "gunzip | docker load" 2>&1

          echo "Transfer exit code: $?"

      - name: Deploy container on server
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          printf '%s\n' "$SSH_KEY" > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key

          ssh -i ~/.ssh/server_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=30 \
              -p 8443 \
              root@78.157.51.14 'bash -s' << 'REMOTE'

          set -e
          APP_UUID="jw4kpfn8utdybrmwkr80fm8f"
          IMAGE="beewaz-web:latest"

          echo "=== Stopping old container ==="
          docker stop "$APP_UUID" 2>/dev/null || true
          docker rm   "$APP_UUID" 2>/dev/null || true

          echo "=== Starting container ==="
          docker run -d \
            --name "$APP_UUID" \
            --network coolify \
            --restart unless-stopped \
            -e NODE_ENV=production \
            -e NEXT_TELEMETRY_DISABLED=1 \
            -e AUTH_TRUST_HOST=1 \
            -e NEXT_PUBLIC_APP_URL=https://bz360.ir \
            -e NEXTAUTH_URL=https://bz360.ir \
            -e AUTH_SECRET=5vjMEFsjPfvqqv8305UAgYrmainnBzaSCrReqMIOKFs= \
            -e "DATABASE_URL=postgres://postgres:mtaaBCMdq1yyV48K1b9N7bQr2HBgL0QPgLzXQ5JKKq2dHpzUF8CenMifnYGcfama@j1jerkqljysca3o9y3rdxojf:5432/postgres" \
            -e ADMIN_PHONE=09102413207 \
            -e ADMIN_PASSWORD=Beewaz1403Admin \
            -e "ADMIN_NAME=مدیر سیستم" \
            -l "traefik.enable=true" \
            -l "traefik.http.middlewares.gzip.compress=true" \
            -l "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https" \
            -l "traefik.http.routers.http-0-${APP_UUID}.entryPoints=http" \
            -l "traefik.http.routers.http-0-${APP_UUID}.middlewares=redirect-to-https" \
            -l "traefik.http.routers.http-0-${APP_UUID}.rule=Host(\`bz360.ir\`) && PathPrefix(\`/\`)" \
            -l "traefik.http.routers.http-0-${APP_UUID}.service=http-0-${APP_UUID}" \
            -l "traefik.http.routers.https-0-${APP_UUID}.entryPoints=https" \
            -l "traefik.http.routers.https-0-${APP_UUID}.middlewares=gzip" \
            -l "traefik.http.routers.https-0-${APP_UUID}.rule=Host(\`bz360.ir\`) && PathPrefix(\`/\`)" \
            -l "traefik.http.routers.https-0-${APP_UUID}.service=https-0-${APP_UUID}" \
            -l "traefik.http.routers.https-0-${APP_UUID}.tls.certresolver=letsencrypt" \
            -l "traefik.http.routers.https-0-${APP_UUID}.tls=true" \
            -l "traefik.http.services.http-0-${APP_UUID}.loadbalancer.server.port=3000" \
            -l "traefik.http.services.https-0-${APP_UUID}.loadbalancer.server.port=3000" \
            "$IMAGE"

          echo "=== Container status ==="
          sleep 15
          docker inspect "$APP_UUID" --format='Status: {{.State.Status}}'
          docker logs "$APP_UUID" --tail=20 2>&1
          echo "=== DONE ==="
          REMOTE
