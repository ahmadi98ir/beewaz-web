name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── مرحله ۱: تست ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── مرحله ۲: Build + Deploy (فقط main) ───────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://bz360.ir \
            -t beewaz-web:latest \
            .
          docker save beewaz-web:latest | gzip > beewaz-image.tar.gz
          SIZE=$(du -sh beewaz-image.tar.gz | cut -f1)
          echo "IMAGE_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Docker image size: $SIZE"
          ls -lh beewaz-image.tar.gz

      - name: Stream image to server
        env:
          SSHPASS: ${{ secrets.SSH_PASS }}
        run: |
          sudo apt-get install -y sshpass > /dev/null 2>&1
          echo "Image size: $(du -sh beewaz-image.tar.gz | cut -f1)"
          sshpass -e ssh \
            -p ${{ secrets.SSH_PORT }} \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            -o ServerAliveInterval=60 \
            -o ServerAliveCountMax=20 \
            ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cat > /tmp/beewaz-image.tar.gz" < beewaz-image.tar.gz
          echo "✅ Image uploaded to server"

      - name: Restart via Coolify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASS }}
          script: |
            set -e
            docker load < /tmp/beewaz-image.tar.gz
            rm -f /tmp/beewaz-image.tar.gz
            HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
              -X POST http://localhost:8000/api/v1/applications/${{ secrets.COOLIFY_APP_UUID }}/restart \
              -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
              -H "Content-Type: application/json" \
              --max-time 15 || echo "000")
            if [ "$HTTP" = "200" ] || [ "$HTTP" = "202" ]; then
              echo "✅ Coolify restart triggered"
            else
              CONTAINER=$(docker ps --format "{{.Names}}" | grep -i beewaz | head -1)
              [ -n "$CONTAINER" ] && docker restart "$CONTAINER" && echo "✅ Container restarted" || exit 1
            fi

      - name: Health check
        run: |
          sleep 45
          HTTP=$(curl -sf --max-time 15 -o /dev/null -w '%{http_code}' https://bz360.ir/ || echo "000")
          echo "Site returned HTTP $HTTP"
          if [ "$HTTP" = "200" ] || [ "$HTTP" = "301" ] || [ "$HTTP" = "302" ]; then
            echo "## ✅ Deploy موفق — commit \`${GITHUB_SHA:0:8}\` | image ${{ env.IMAGE_SIZE }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Health check failed (HTTP $HTTP)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
