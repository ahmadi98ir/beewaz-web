name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── مرحله ۱: تست ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── مرحله ۲: Build standalone + Upload to deploy-cache (فقط main) ─────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone)
        env:
          NEXT_PUBLIC_APP_URL: https://beewaz.ir
        run: npm run build

      - name: Assemble build tarball
        run: |
          rm -rf bundle && mkdir -p bundle
          cp -r .next/standalone/. bundle/
          mkdir -p bundle/.next
          cp -r .next/static bundle/.next/static
          [ -d public ] && cp -r public bundle/public || true
          [ -d src/lib/db/migrations ] && cp -r src/lib/db/migrations bundle/migrations || true
          cp entrypoint.sh bundle/entrypoint.sh
          # mini Dockerfile so server can docker build from this tarball
          cat > bundle/Dockerfile <<'EODF'
          FROM node:22-alpine
          WORKDIR /app
          RUN addgroup --system --gid 1001 nodejs && adduser --system --uid 1001 nextjs
          COPY --chown=nextjs:nodejs . .
          RUN chmod +x ./entrypoint.sh
          EXPOSE 3000
          ENV PORT=3000
          ENV HOSTNAME="0.0.0.0"
          ENV NODE_ENV=production
          ENV NEXT_TELEMETRY_DISABLED=1
          CMD ["./entrypoint.sh"]
          EODF
          tar -czf beewaz-build.tar.gz -C bundle .
          SIZE=$(du -sh beewaz-build.tar.gz | cut -f1)
          echo "BUILD_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Tarball size: $SIZE"

      - name: Upload to deploy-cache release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # حذف release قبلی و ساخت جدید — تا release ID عوض بشه و سرور تشخیص بده
          gh release delete deploy-cache --yes 2>/dev/null || true
          git push origin :refs/tags/deploy-cache 2>/dev/null || true
          sleep 2
          gh release create deploy-cache beewaz-build.tar.gz \
            --title "Deploy Cache (${GITHUB_SHA:0:8})" \
            --notes "Built from commit ${GITHUB_SHA} at $(date -u)" \
            --latest=false
          echo "## ✅ Build uploaded — commit \`${GITHUB_SHA:0:8}\` | ${{ env.BUILD_SIZE }}" >> $GITHUB_STEP_SUMMARY

      - name: Switch Coolify to dockerfile build + trigger deploy
        run: |
          SERVER="http://78.157.51.14:8000"
          TOKEN="5|beewaz-deploy-fix-2026"
          APP_UUID="jw4kpfn8utdybrmwkr80fm8f"

          echo "=== Checking current app config ==="
          curl -sf --max-time 15 \
            -H "Authorization: Bearer $TOKEN" \
            "$SERVER/api/v1/applications/$APP_UUID" 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('build_pack:', d.get('build_pack'), '| status:', d.get('status'))" \
            2>/dev/null || echo "Could not reach Coolify API"

          echo "=== Switching build_pack to dockerfile ==="
          PATCH_RESULT=$(curl -sf --max-time 15 \
            -X PATCH "$SERVER/api/v1/applications/$APP_UUID" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"build_pack":"dockerfile","dockerfile_location":"/Dockerfile"}' \
            2>/dev/null || echo "PATCH_FAILED")
          echo "Patch result: $PATCH_RESULT"

          echo "=== Triggering Coolify deploy ==="
          DEPLOY_RESULT=$(curl -sf --max-time 15 \
            -X GET "$SERVER/api/v1/deploy?uuid=$APP_UUID&force=true" \
            -H "Authorization: Bearer $TOKEN" \
            2>/dev/null || echo "DEPLOY_FAILED")
          echo "Deploy result: $DEPLOY_RESULT"

          echo "## ⏱ Coolify notified — building from Dockerfile (no ghcr.io needed)" >> $GITHUB_STEP_SUMMARY
