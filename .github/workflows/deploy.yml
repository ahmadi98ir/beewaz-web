name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}
  APP_UUID: jw4kpfn8utdybrmwkr80fm8f
  SERVER_IP: 78.157.51.14

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build روی GitHub (اینترنت stable) و push به GHCR ──
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # build-push-action فقط push می‌کند؛ برای docker save باید pull کنیم
      - name: Pull image to local daemon
        run: docker pull ${{ env.IMAGE }}:latest

      # ── Save image and push directly to server (SSH from GHA to Iran is blocked) ──
      # Secrets needed:
      #   IMAGE_UPLOAD_TOKEN  — token for the image receiver on port 5001
      #   COOLIFY_TOKEN       — value: 5|beewaz-deploy-fix-2026
      - name: Transfer image to server
        run: |
          IMAGE="${{ env.IMAGE }}:latest"
          echo "=== Saving image to tar.gz ==="
          docker save "$IMAGE" | gzip > /tmp/beewaz-image.tar.gz
          IMAGE_SIZE=$(stat -c%s /tmp/beewaz-image.tar.gz)
          echo "Compressed size: $((IMAGE_SIZE / 1024 / 1024)) MB"

          echo "=== Uploading to server port 5001 ==="
          HTTP_CODE=$(curl -s -o /tmp/upload-resp.txt -w '%{http_code}' \
            -X POST \
            -H "X-Upload-Token: ${{ secrets.IMAGE_UPLOAD_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @/tmp/beewaz-image.tar.gz \
            "http://${{ env.SERVER_IP }}:5001" \
            --max-time 600)
          echo "HTTP $HTTP_CODE — $(cat /tmp/upload-resp.txt)"
          [ "$HTTP_CODE" = "200" ] || { echo "Upload failed!"; exit 1; }

      - name: Trigger Coolify deploy
        run: |
          echo "=== Triggering deploy via Coolify API ==="
          HTTP_CODE=$(curl -s -o /tmp/deploy-resp.json -w '%{http_code}' \
            -X POST \
            "http://${{ env.SERVER_IP }}:8000/api/v1/applications/${{ env.APP_UUID }}/start" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json" \
            --max-time 30)
          echo "HTTP $HTTP_CODE — $(cat /tmp/deploy-resp.json)"
          [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ] || { echo "Deploy trigger failed!"; exit 1; }
          echo "Deploy queued successfully"

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/${{ github.repository }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://bz360.ir |" >> $GITHUB_STEP_SUMMARY
