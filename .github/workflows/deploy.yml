name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build روی GitHub (اینترنت stable) و push به GHCR ──
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── از طریق SSH: تغییر buildpack به dockerimage + deploy ──
      - name: Switch to dockerimage & deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 8443
          timeout: 60s
          command_timeout: 3m
          script: |
            set -e
            TOKEN="${{ secrets.COOLIFY_TOKEN }}"
            APP_UUID="jw4kpfn8utdybrmwkr80fm8f"
            IMAGE="ghcr.io/${{ github.repository }}:latest"

            echo "=== 1. Switch buildpack to dockerimage ==="
            for PORT in 8000 80; do
              RESP=$(curl -s -w "\n%{http_code}" -X PATCH \
                "http://127.0.0.1:${PORT}/api/v1/applications/${APP_UUID}" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                -d "{\"build_pack\":\"dockerimage\",\"docker_registry_image_name\":\"ghcr.io/${{ github.repository }}\",\"docker_registry_image_tag\":\"latest\"}" \
                --max-time 10 2>/dev/null)
              CODE=$(echo "$RESP" | tail -1)
              echo "Port ${PORT}: HTTP ${CODE}"
              [ "$CODE" = "200" ] && echo "Buildpack switched!" && break
            done

            echo "=== 2. Login to GHCR on server ==="
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io \
              -u "${{ github.actor }}" --password-stdin

            echo "=== 3. Pull latest image ==="
            docker pull "${IMAGE}"
            echo "Image pulled: ${IMAGE}"

            echo "=== 4. Trigger Coolify deploy ==="
            for PORT in 8000 80; do
              CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
                "http://127.0.0.1:${PORT}/api/v1/applications/${APP_UUID}/start" \
                -H "Authorization: Bearer ${TOKEN}" \
                -H "Content-Type: application/json" \
                --max-time 15 2>/dev/null)
              echo "Port ${PORT}: HTTP ${CODE}"
              [ "$CODE" = "200" ] || [ "$CODE" = "201" ] && echo "Deploy queued!" && break
            done

      - name: Summary
        if: always()
        run: |
          echo "## 🚀 Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/${{ github.repository }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://bz360.ir |" >> $GITHUB_STEP_SUMMARY
