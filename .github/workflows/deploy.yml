name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── مرحله ۱: تست ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── مرحله ۲: Build + Deploy (فقط main) ───────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Test port connectivity
        run: |
          SERVER=${{ secrets.SSH_HOST }}
          for port in 80 443 8000 8443 9001; do
            result=$(timeout 5 bash -c "echo > /dev/tcp/$SERVER/$port" 2>&1 && echo "OPEN" || echo "CLOSED/TIMEOUT")
            echo "Port $port: $result"
          done

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://bz360.ir \
            -t beewaz-web:latest \
            .
          docker save beewaz-web:latest | gzip > beewaz-image.tar.gz
          SIZE=$(du -sh beewaz-image.tar.gz | cut -f1)
          echo "IMAGE_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Docker image size: $SIZE"

      - name: Deploy via webhook
        run: |
          echo "Uploading ${{ env.IMAGE_SIZE }} image to deploy webhook..."
          HTTP=$(curl -sf -o /dev/null -w "%{http_code}" \
            --max-time 300 \
            -X POST http://${{ secrets.SSH_HOST }}:9001 \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_RECEIVER_TOKEN }}" \
            -H "Content-Type: application/octet-stream" \
            --data-binary @beewaz-image.tar.gz)
          echo "Webhook returned HTTP $HTTP"
          if [ "$HTTP" = "200" ]; then
            echo "## ✅ Deploy موفق — commit \`${GITHUB_SHA:0:8}\` | image ${{ env.IMAGE_SIZE }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deploy failed (HTTP $HTTP)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      - name: Health check
        run: |
          sleep 30
          HTTP=$(curl -sf --max-time 15 -o /dev/null -w '%{http_code}' https://bz360.ir/ || echo "000")
          echo "Site returned HTTP $HTTP"
          if [ "$HTTP" != "200" ] && [ "$HTTP" != "301" ] && [ "$HTTP" != "302" ]; then
            echo "⚠️ Health check failed (HTTP $HTTP)" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
