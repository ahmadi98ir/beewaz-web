name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: false
          load: true
          tags: beewaz-web:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save & compress Docker image
        run: |
          docker save beewaz-web:latest | gzip -1 > /tmp/beewaz-web.tar.gz
          SIZE=$(du -sh /tmp/beewaz-web.tar.gz | cut -f1)
          echo "Compressed size: $SIZE"
          echo "IMAGE_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Delete previous release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete old release if exists
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/docker-latest --jq .id 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            gh api --method DELETE repos/${{ github.repository }}/releases/$RELEASE_ID || true
          fi
          # Delete the tag
          git push origin :refs/tags/docker-latest 2>/dev/null || true

      - name: Create release and upload image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:8}"
          # Create new release
          gh release create docker-latest \
            --title "Docker image (latest) — $SHORT_SHA" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            --target ${{ github.sha }} \
            /tmp/beewaz-web.tar.gz#beewaz-web.tar.gz
          echo "Release created successfully"
          echo "Download URL: https://github.com/${{ github.repository }}/releases/download/docker-latest/beewaz-web.tar.gz"
