name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        env:
          NEXT_PUBLIC_APP_URL: https://bz360.ir
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Package build
        run: |
          ls -la .next/
          ls -la .next/standalone/ || echo "standalone dir missing!"
          # Package standalone (excludes static which is served separately)
          tar -czf /tmp/beewaz-build.tar.gz --exclude='./.next/static' -C .next/standalone .
          # Package static assets
          tar -czf /tmp/beewaz-static.tar.gz -C .next/static .
          echo "Build size: $(du -sh /tmp/beewaz-build.tar.gz | cut -f1)"
          echo "Static size: $(du -sh /tmp/beewaz-static.tar.gz | cut -f1)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H 78.157.51.14 >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to server
        run: |
          # Copy build artifacts to server
          scp -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no \
            /tmp/beewaz-build.tar.gz /tmp/beewaz-static.tar.gz \
            root@78.157.51.14:/tmp/

          # Apply update inside running container
          ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no root@78.157.51.14 '
            set -e
            CONTAINER=$(docker ps --format "{{.Names}}\t{{.Image}}" | grep beewaz | cut -f1 | head -1)
            if [ -z "$CONTAINER" ]; then echo "No beewaz container found!"; exit 1; fi
            echo "Updating container: $CONTAINER"

            # Extract build into container
            docker cp /tmp/beewaz-build.tar.gz $CONTAINER:/tmp/
            docker exec $CONTAINER sh -c "cd /app && tar -xzf /tmp/beewaz-build.tar.gz && rm /tmp/beewaz-build.tar.gz"

            # Update static files
            docker cp /tmp/beewaz-static.tar.gz $CONTAINER:/tmp/
            docker exec $CONTAINER sh -c "mkdir -p /app/.next/static && tar -xzf /tmp/beewaz-static.tar.gz -C /app/.next/static && rm /tmp/beewaz-static.tar.gz"

            # Restart container
            docker restart $CONTAINER
            rm -f /tmp/beewaz-build.tar.gz /tmp/beewaz-static.tar.gz
            echo "Deploy done!"
          '

      - name: Summary
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://bz360.ir |" >> $GITHUB_STEP_SUMMARY
