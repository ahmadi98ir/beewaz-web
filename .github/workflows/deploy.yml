name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: false
          load: true
          tags: beewaz-web:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save & compress Docker image
        run: |
          docker save beewaz-web:latest | gzip -1 > /tmp/beewaz-web.tar.gz
          SIZE=$(du -sh /tmp/beewaz-web.tar.gz | cut -f1)
          echo "Compressed size: $SIZE"
          echo "IMAGE_SIZE=$SIZE" >> $GITHUB_ENV

      - name: Delete previous release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_ID=$(gh api repos/${{ github.repository }}/releases/tags/docker-latest --jq .id 2>/dev/null || echo "")
          if [ -n "$RELEASE_ID" ]; then
            gh api --method DELETE repos/${{ github.repository }}/releases/$RELEASE_ID || true
          fi
          git push origin :refs/tags/docker-latest 2>/dev/null || true

      - name: Create release and upload image
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_SHA="${{ github.sha }}"
          SHORT_SHA="${COMMIT_SHA:0:8}"
          gh release create docker-latest \
            --title "Docker image (latest) — $SHORT_SHA" \
            --notes "Auto-built from commit ${{ github.sha }}" \
            --target ${{ github.sha }} \
            /tmp/beewaz-web.tar.gz#beewaz-web.tar.gz
          echo "Release created: https://github.com/${{ github.repository }}/releases/download/docker-latest/beewaz-web.tar.gz"

      - name: Trigger Coolify deployment
        continue-on-error: true
        run: |
          echo "Triggering Coolify deploy..."
          RESPONSE=$(curl -s -o /tmp/coolify_resp.txt -w "%{http_code}" \
            -X GET "http://cool.rpim.ir/api/v1/deploy?uuid=ai1rr235nbzmyyvd6nuxaynd&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Accept: application/json" \
            --max-time 30)
          echo "HTTP Status: $RESPONSE"
          cat /tmp/coolify_resp.txt
          if [ "$RESPONSE" = "200" ]; then
            echo "Coolify deploy queued successfully!"
          else
            echo "WARNING: Coolify API returned $RESPONSE — manual deploy may be needed"
            echo "Go to http://cool.rpim.ir to trigger deploy from UI"
          fi
