name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── مرحله ۱: تست ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── مرحله ۲: Build + Release (فقط main) ──────────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_APP_URL=https://bz360.ir \
            -t beewaz-web:latest \
            .
          docker save beewaz-web:latest | gzip > beewaz-image.tar.gz
          SIZE=$(du -sh beewaz-image.tar.gz | cut -f1)
          echo "IMAGE_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Docker image size: $SIZE"

      - name: Publish release (server will auto-pull)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete deploy-latest --yes 2>/dev/null || true
          gh release create deploy-latest \
            beewaz-image.tar.gz \
            --title "Deploy ${GITHUB_SHA:0:8} ($(date -u '+%Y-%m-%d %H:%M UTC'))" \
            --notes "size: ${{ env.IMAGE_SIZE }} | commit: ${GITHUB_SHA:0:8}"
          echo "## ✅ Release آپلود شد" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image  | ${{ env.IMAGE_SIZE }} |" >> $GITHUB_STEP_SUMMARY
          echo "سرور تا ۵ دقیقه دیگر به‌روز می‌شود" >> $GITHUB_STEP_SUMMARY
