name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── مرحله ۱: تست ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── مرحله ۲: Build standalone + Upload to deploy-cache (فقط main) ─────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (standalone)
        env:
          NEXT_PUBLIC_APP_URL: https://beewaz.ir
        run: npm run build

      - name: Assemble build tarball
        run: |
          rm -rf bundle && mkdir -p bundle
          cp -r .next/standalone/. bundle/
          mkdir -p bundle/.next
          cp -r .next/static bundle/.next/static
          [ -d public ] && cp -r public bundle/public || true
          [ -d src/lib/db/migrations ] && cp -r src/lib/db/migrations bundle/migrations || true
          cp entrypoint.sh bundle/entrypoint.sh
          # mini Dockerfile so server can docker build from this tarball (no leading spaces)
          printf '%s\n' \
            'FROM node:22-alpine' \
            'WORKDIR /app' \
            'RUN addgroup --system --gid 1001 nodejs && adduser --system --uid 1001 nextjs' \
            'COPY --chown=nextjs:nodejs . .' \
            'RUN chmod +x ./entrypoint.sh' \
            'EXPOSE 3000' \
            'ENV PORT=3000' \
            'ENV HOSTNAME="0.0.0.0"' \
            'ENV NODE_ENV=production' \
            'ENV NEXT_TELEMETRY_DISABLED=1' \
            'CMD ["./entrypoint.sh"]' \
            > bundle/Dockerfile
          tar -czf beewaz-build.tar.gz -C bundle .
          SIZE=$(du -sh beewaz-build.tar.gz | cut -f1)
          echo "BUILD_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Tarball size: $SIZE"

      - name: Upload to deploy-cache release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # حذف release قبلی و ساخت جدید — تا release ID عوض بشه و سرور تشخیص بده
          gh release delete deploy-cache --yes 2>/dev/null || true
          git push origin :refs/tags/deploy-cache 2>/dev/null || true
          sleep 2
          gh release create deploy-cache beewaz-build.tar.gz \
            --title "Deploy Cache (${GITHUB_SHA:0:8})" \
            --notes "Built from commit ${GITHUB_SHA} at $(date -u)" \
            --latest=false
          echo "## ✅ Build uploaded — commit \`${GITHUB_SHA:0:8}\` | ${{ env.BUILD_SIZE }}" >> $GITHUB_STEP_SUMMARY

      - name: Deploy to server via SSH
        env:
          SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          # نصب SSH key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # debug: validate key format
          echo "Key first line: $(head -1 ~/.ssh/deploy_key)"
          echo "Key lines: $(wc -l < ~/.ssh/deploy_key)"
          ssh-keygen -l -f ~/.ssh/deploy_key 2>&1 || echo "Key validation failed"

          # test SSH connectivity
          echo "Testing SSH port..."
          nc -zv -w10 78.157.51.14 22 2>&1 || echo "Port 22 unreachable from GitHub Actions"

          ssh-keyscan -H 78.157.51.14 >> ~/.ssh/known_hosts 2>/dev/null || true

          # آپلود tarball به سرور
          scp -v -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -o ConnectTimeout=15 \
            beewaz-build.tar.gz root@78.157.51.14:/tmp/beewaz-build.tar.gz

          # deploy روی سرور
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no root@78.157.51.14 << 'ENDSSH'
            set -e
            echo "[deploy] Extracting tarball..."
            rm -rf /tmp/bz-build && mkdir /tmp/bz-build
            tar -xzf /tmp/beewaz-build.tar.gz -C /tmp/bz-build

            echo "[deploy] Finding container..."
            CONTAINER=$(docker ps --format "{{.Names}}" | grep jw4kpfn8utdybrmwkr80fm8f | head -1)
            IMAGE=$(docker inspect --format '{{.Config.Image}}' "$CONTAINER")
            echo "[deploy] Container: $CONTAINER | Image: $IMAGE"

            echo "[deploy] Building Docker image..."
            docker build -t "$IMAGE" /tmp/bz-build

            echo "[deploy] Restarting container..."
            docker restart "$CONTAINER"
            echo "[deploy] ✅ Deploy successful!"
          ENDSSH

          echo "## ✅ Deployed via SSH — commit \`${GITHUB_SHA:0:8}\`" >> $GITHUB_STEP_SUMMARY
