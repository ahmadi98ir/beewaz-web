name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── مرحله ۱: تست ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── مرحله ۲: Build standalone + Upload to deploy-cache (فقط main) ─────────
  # خروجی سبک (~۲۰MB) که با scripts/deploy.ps1 روی کانتینر کپی می‌شود
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build (standalone)
        env:
          NEXT_PUBLIC_APP_URL: https://beewaz.ir
        run: npm run build

      - name: Assemble build tarball
        run: |
          # ساختار /app کانتینر را بازسازی می‌کنیم (مطابق Dockerfile)
          rm -rf bundle && mkdir -p bundle
          cp -r .next/standalone/. bundle/
          mkdir -p bundle/.next
          cp -r .next/static bundle/.next/static
          [ -d public ] && cp -r public bundle/public || true
          tar -czf beewaz-build.tar.gz -C bundle .
          echo "${GITHUB_SHA}" > build-version.txt
          SIZE=$(du -sh beewaz-build.tar.gz | cut -f1)
          echo "BUILD_SIZE=$SIZE" >> $GITHUB_ENV
          echo "Build tarball size: $SIZE"

      - name: Upload to deploy-cache release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # release موجود را آپدیت می‌کنیم (tag ثابت می‌ماند تا لینک deploy.ps1 نشکند)
          if gh release view deploy-cache >/dev/null 2>&1; then
            gh release upload deploy-cache beewaz-build.tar.gz build-version.txt --clobber
          else
            gh release create deploy-cache beewaz-build.tar.gz build-version.txt \
              --title "deploy-cache" \
              --notes "Latest standalone build" \
              --latest=false
          fi
          echo "## ✅ Build uploaded — commit \`${GITHUB_SHA:0:8}\` | ${{ env.BUILD_SIZE }}" >> $GITHUB_STEP_SUMMARY

      - name: Deploy to server via SSH
        env:
          SSH_PASS: ${{ secrets.DEPLOY_SSH_PASS }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          sudo apt-get install -y sshpass >/dev/null 2>&1

          ssh_cmd() {
            sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -p 8443 root@78.157.51.14 "$@"
          }

          echo "→ Downloading build on server..."
          ssh_cmd "
            set -e
            curl -sfL --doh-url https://1.1.1.1/dns-query \
              -H 'Authorization: token ${{ secrets.GITHUB_TOKEN }}' \
              -H 'Accept: application/octet-stream' \
              'https://github.com/ahmadi98ir/beewaz-web/releases/download/deploy-cache/beewaz-build.tar.gz' \
              -o /tmp/bz-build.tar.gz
            echo 'Download done: '$(du -sh /tmp/bz-build.tar.gz | cut -f1)
          "

          echo "→ Copying files into container..."
          ssh_cmd "
            set -e
            CONTAINER=\$(docker ps --format '{{.Names}}' | grep -i beewaz | head -1)
            if [ -z \"\$CONTAINER\" ]; then echo 'ERROR: no beewaz container'; exit 1; fi
            echo \"Container: \$CONTAINER\"
            rm -rf /tmp/bz-bundle && mkdir /tmp/bz-bundle
            tar -xzf /tmp/bz-build.tar.gz -C /tmp/bz-bundle
            docker cp /tmp/bz-bundle/. \$CONTAINER:/app/
            rm -rf /tmp/bz-build.tar.gz /tmp/bz-bundle
            echo 'Files copied'
          "

          echo "→ Restarting via Coolify..."
          HTTP=$(sshpass -p "$SSH_PASS" ssh -o StrictHostKeyChecking=no -p 8443 root@78.157.51.14 \
            "curl -sf -o /dev/null -w '%{http_code}' --max-time 30 \
              -X POST 'http://localhost:8000/api/v1/applications/jw4kpfn8utdybrmwkr80fm8f/restart' \
              -H 'Authorization: Bearer $COOLIFY_TOKEN' \
              -H 'Content-Type: application/json' || echo 000")
          echo "  Coolify: HTTP $HTTP"

          if [ "$HTTP" = "200" ] || [ "$HTTP" = "202" ]; then
            echo "## 🚀 Deployed \`${GITHUB_SHA:0:8}\` to production!" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Coolify restart returned HTTP $HTTP — trying docker restart..."  >> $GITHUB_STEP_SUMMARY
            ssh_cmd "docker restart \$(docker ps --format '{{.Names}}' | grep -i beewaz | head -1)"
            echo "## 🚀 Deployed \`${GITHUB_SHA:0:8}\` via docker restart" >> $GITHUB_STEP_SUMMARY
          fi
