name: CI / CD

on:
  push:
    branches: [main, claude/ecstatic-galileo-cvmNQ]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── مرحله ۱: تست ──────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

  # ── مرحله ۲: Build Docker image + Push to ghcr.io ─────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/claude/ecstatic-galileo-cvmNQ') && github.event_name == 'push'
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/ahmadi98ir/beewaz-web:latest
            ghcr.io/ahmadi98ir/beewaz-web:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://beewaz.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger Coolify redeploy
        continue-on-error: true
        run: |
          RESPONSE=$(curl -s -o /tmp/coolify_resp.txt -w "%{http_code}" \
            --max-time 15 \
            -X POST "http://78.157.51.14:8000/api/v1/applications/jw4kpfn8utdybrmwkr80fm8f/deploy" \
            -H "Authorization: Bearer 5|beewaz-deploy-fix-2026" \
            -H "Content-Type: application/json") || RESPONSE="timeout"
          echo "Coolify response: $RESPONSE"
          cat /tmp/coolify_resp.txt 2>/dev/null || true
          if [[ "$RESPONSE" =~ ^2 ]]; then
            echo "## ✅ Coolify deploy triggered — commit \`${GITHUB_SHA:0:8}\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ⚠️ Coolify unreachable ($RESPONSE) — pull image manually: ghcr.io/ahmadi98ir/beewaz-web:latest" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload tarball to deploy-cache release (fallback)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          docker save ghcr.io/ahmadi98ir/beewaz-web:latest | gzip > beewaz-image.tar.gz
          SIZE=$(du -sh beewaz-image.tar.gz | cut -f1)
          gh release delete deploy-cache --yes 2>/dev/null || true
          git push origin :refs/tags/deploy-cache 2>/dev/null || true
          sleep 2
          gh release create deploy-cache beewaz-image.tar.gz \
            --title "Deploy Cache (${GITHUB_SHA:0:8})" \
            --notes "Built from commit ${GITHUB_SHA} at $(date -u)" \
            --latest=false
          echo "## ✅ Image tarball uploaded — commit \`${GITHUB_SHA:0:8}\` | $SIZE" >> $GITHUB_STEP_SUMMARY
