name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        env:
          NEXT_PUBLIC_APP_URL: https://bz360.ir
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Package build
        run: |
          ls -la .next/
          ls -la .next/standalone/ || echo "standalone dir missing!"
          # Package standalone (excludes static which is served separately)
          tar -czf /tmp/beewaz-build.tar.gz --exclude='./.next/static' -C .next/standalone .
          # Package static assets
          tar -czf /tmp/beewaz-static.tar.gz -C .next/static .
          echo "Build size: $(du -sh /tmp/beewaz-build.tar.gz | cut -f1)"
          echo "Static size: $(du -sh /tmp/beewaz-static.tar.gz | cut -f1)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 8443 -H 78.157.51.14 >> ~/.ssh/known_hosts 2>/dev/null || true
          echo "StrictHostKeyChecking no" >> ~/.ssh/config
          echo "SSH key ready"

      - name: Deploy to server
        run: |
          SSH="ssh -i ~/.ssh/id_ed25519 -p 8443 -o StrictHostKeyChecking=no -o ConnectTimeout=30"
          SCP="scp -i ~/.ssh/id_ed25519 -P 8443 -o StrictHostKeyChecking=no -o ConnectTimeout=30"

          echo "=== Testing SSH connection ==="
          $SSH root@78.157.51.14 'echo "SSH OK: $(hostname)"'

          echo "=== Copying build files ==="
          $SCP /tmp/beewaz-build.tar.gz root@78.157.51.14:/tmp/beewaz-build.tar.gz
          $SCP /tmp/beewaz-static.tar.gz root@78.157.51.14:/tmp/beewaz-static.tar.gz

          echo "=== Deploying ==="
          $SSH root@78.157.51.14 '
            set -e
            CONTAINER=$(docker ps --format "{{.Names}}\t{{.Image}}" | grep beewaz | cut -f1 | head -1)
            echo "Container: $CONTAINER"

            docker cp /tmp/beewaz-build.tar.gz $CONTAINER:/tmp/
            docker exec $CONTAINER sh -c "cd /app && tar -xzf /tmp/beewaz-build.tar.gz && rm /tmp/beewaz-build.tar.gz"

            docker cp /tmp/beewaz-static.tar.gz $CONTAINER:/tmp/
            docker exec $CONTAINER sh -c "mkdir -p /app/.next/static && tar -xzf /tmp/beewaz-static.tar.gz -C /app/.next/static && rm /tmp/beewaz-static.tar.gz"

            docker restart $CONTAINER
            rm -f /tmp/beewaz-build.tar.gz /tmp/beewaz-static.tar.gz
            echo "Deploy done!"
          '

      - name: Summary
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://bz360.ir |" >> $GITHUB_STEP_SUMMARY
