name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/${{ github.repository }}
  APP_UUID: jw4kpfn8utdybrmwkr80fm8f
  SERVER_IP: 78.157.51.14

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # برای ساخت GitHub Release
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build روی GitHub و push به GHCR ──
      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # build-push-action فقط push می‌کند؛ برای docker save باید pull کنیم
      - name: Pull image to local daemon
        run: docker pull ${{ env.IMAGE }}:latest

      # ── Upload to GitHub Release — سرور هر ۲ دقیقه poll می‌کند و خودش deploy می‌کند ──
      # هیچ تماسی با سرور ایران از GHA نیست (DPI inbound block می‌کند)
      - name: Upload image to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "::add-mask::$GH_TOKEN"
          IMAGE="${{ env.IMAGE }}:latest"
          echo "=== Saving image to tar.gz ==="
          docker save "$IMAGE" | gzip > /tmp/beewaz-image.tar.gz
          echo "Compressed size: $(($(stat -c%s /tmp/beewaz-image.tar.gz) / 1024 / 1024)) MB"

          echo "=== Uploading to GitHub Release ==="
          gh release create deploy-cache --title "Deploy Cache" --prerelease \
            --notes "sha=${{ github.sha }}" 2>/dev/null || true
          gh release upload deploy-cache /tmp/beewaz-image.tar.gz --clobber
          echo "✓ Release uploaded — server polls every 2min and will deploy automatically"

      - name: Summary
        if: always()
        run: |
          echo "## Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`ghcr.io/${{ github.repository }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://bz360.ir |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy | Server polls GitHub every 2min |" >> $GITHUB_STEP_SUMMARY
