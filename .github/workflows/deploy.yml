name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Build
        env:
          NEXT_PUBLIC_APP_URL: https://bz360.ir
          NEXT_TELEMETRY_DISABLED: 1
        run: npm run build

      - name: Package build
        run: |
          tar -czf /tmp/beewaz-build.tar.gz -C .next/standalone .
          echo "Build size: $(du -sh /tmp/beewaz-build.tar.gz | cut -f1)"

      - name: Deploy via HTTP webhook
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          CHUNK_SIZE=$((1024 * 1024))  # 1MB chunks
          FILE=/tmp/beewaz-build.tar.gz
          TOTAL_SIZE=$(stat -c%s $FILE)
          TOTAL_CHUNKS=$(( (TOTAL_SIZE + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          echo "Sending $TOTAL_CHUNKS chunks of 1MB to webhook..."
          echo "Secret length: ${#DEPLOY_SECRET}"

          for i in $(seq 0 $((TOTAL_CHUNKS - 1))); do
            HTTP_CODE=$(dd if=$FILE bs=$CHUNK_SIZE skip=$i count=1 2>/dev/null | \
              curl -s -o /tmp/resp.txt -w '%{http_code}' \
                -X POST \
                -H "X-Deploy-Token: $DEPLOY_SECRET" \
                -H "X-Deploy-Mode: build" \
                -H "Content-Type: application/octet-stream" \
                -H "X-Chunk-Index: $i" \
                -H "X-Total-Chunks: $TOTAL_CHUNKS" \
                --data-binary @- \
                --max-time 60 \
                https://bz360.ir/x-deploy-9001)
            echo "Chunk $((i+1))/$TOTAL_CHUNKS → HTTP $HTTP_CODE $(cat /tmp/resp.txt)"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "FAILED at chunk $i: HTTP $HTTP_CODE" >> $GITHUB_STEP_SUMMARY
              echo "Response: $(cat /tmp/resp.txt)" >> $GITHUB_STEP_SUMMARY
              exit 1
            fi
          done
          echo "Deploy complete!" >> $GITHUB_STEP_SUMMARY

      - name: Summary
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://bz360.ir |" >> $GITHUB_STEP_SUMMARY
