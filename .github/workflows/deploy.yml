name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE: ghcr.io/ahmadi98ir/beewaz-web

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir

      - name: Pull image locally
        run: docker pull ${{ env.IMAGE }}:latest

      - name: Connect to VPN
        run: |
          sudo apt-get update && sudo apt-get install -y openvpn
          echo "${{ secrets.OPENVPN_CONFIG }}" > /tmp/vpn.conf
          sudo openvpn --config /tmp/vpn.conf --daemon --log /tmp/vpn.log
          sleep 60
          sudo cat /tmp/vpn.log || true
          if ip link show tun0 > /dev/null 2>&1; then
            echo "VPN connected!"
            sudo ip route add 78.157.51.14/32 dev tun0 || true
            echo "VPN_OK=1" >> $GITHUB_ENV
          else
            echo "VPN not connected, will use small chunks"
            echo "VPN_OK=0" >> $GITHUB_ENV
          fi

      - name: Stream image to server in chunks
        env:
          DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        run: |
          echo "=== Saving image ==="
          docker save ${{ env.IMAGE }}:latest | gzip > /tmp/beewaz.tar.gz
          TOTAL_SIZE=$(stat -c%s /tmp/beewaz.tar.gz)
          echo "Image size: $(du -sh /tmp/beewaz.tar.gz | cut -f1)"

          if [ "$VPN_OK" = "1" ]; then
            CHUNK_SIZE=$((8 * 1024 * 1024))
            TIMEOUT=120
            echo "VPN mode: 8MB chunks"
          else
            CHUNK_SIZE=$((64 * 1024))
            TIMEOUT=60
            echo "Direct mode: 64KB chunks"
          fi

          TOTAL_CHUNKS=$(( (TOTAL_SIZE + CHUNK_SIZE - 1) / CHUNK_SIZE ))
          echo "Sending $TOTAL_CHUNKS chunks..."

          for i in $(seq 0 $((TOTAL_CHUNKS - 1))); do
            [ $((i % 50)) -eq 0 ] && echo "  Chunk $((i+1))/$TOTAL_CHUNKS..."
            HTTP_CODE=$(dd if=/tmp/beewaz.tar.gz bs=$CHUNK_SIZE skip=$i count=1 2>/dev/null | \
              curl -s -o /tmp/chunk-resp.txt -w '%{http_code}' \
                -X POST \
                -H "X-Deploy-Token: $DEPLOY_WEBHOOK_SECRET" \
                -H "Content-Type: application/octet-stream" \
                -H "X-Chunk-Index: $i" \
                -H "X-Total-Chunks: $TOTAL_CHUNKS" \
                --data-binary @- \
                --max-time $TIMEOUT \
                https://bz360.ir/x-deploy-9001)
            [ "$HTTP_CODE" = "200" ] || { echo "Chunk $i failed: HTTP $HTTP_CODE $(cat /tmp/chunk-resp.txt)"; exit 1; }
          done
          echo "=== Deploy complete! ==="

      - name: Summary
        if: always()
        run: |
          echo "## Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${GITHUB_SHA:0:8}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Site | https://bz360.ir |" >> $GITHUB_STEP_SUMMARY
