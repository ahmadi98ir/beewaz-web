name: Build & Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.ci
          push: false
          load: true
          tags: beewaz-web:latest
          build-args: |
            NEXT_PUBLIC_APP_URL=https://bz360.ir
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Setup SSH key
        env:
          SSH_KEY_B64: ${{ secrets.SERVER_SSH_KEY_B64 }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY_B64" | base64 -d > ~/.ssh/server_key
          chmod 600 ~/.ssh/server_key
          echo "Key: $(wc -c < ~/.ssh/server_key) bytes"
          ssh -i ~/.ssh/server_key -o StrictHostKeyChecking=no -o ConnectTimeout=15 \
              -o BatchMode=yes -p 8443 root@78.157.51.14 "echo SSH_OK" 2>&1

      - name: Save & compress Docker image
        run: |
          docker save beewaz-web:latest | gzip -1 > /tmp/beewaz-web.tar.gz
          echo "Compressed size: $(du -sh /tmp/beewaz-web.tar.gz | cut -f1)"

      - name: Transfer image via SCP
        run: |
          scp -P 8443 \
              -i ~/.ssh/server_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ConnectTimeout=60 \
              -o Compression=no \
              /tmp/beewaz-web.tar.gz \
              root@78.157.51.14:/tmp/beewaz-web.tar.gz
          echo "SCP done: $?"

      - name: Load image and start container
        run: |
          ssh -i ~/.ssh/server_key \
              -o StrictHostKeyChecking=no \
              -o ServerAliveInterval=30 \
              -o ConnectTimeout=60 \
              -p 8443 root@78.157.51.14 'bash -s' << 'REMOTE'
          set -e
          echo "=== Loading Docker image ==="
          docker load < /tmp/beewaz-web.tar.gz
          rm -f /tmp/beewaz-web.tar.gz

          APP="jw4kpfn8utdybrmwkr80fm8f"
          docker stop "$APP" 2>/dev/null || true
          docker rm   "$APP" 2>/dev/null || true

          docker run -d \
            --name "$APP" --network coolify --restart unless-stopped \
            -e NODE_ENV=production -e NEXT_TELEMETRY_DISABLED=1 -e AUTH_TRUST_HOST=1 \
            -e NEXT_PUBLIC_APP_URL=https://bz360.ir -e NEXTAUTH_URL=https://bz360.ir \
            -e AUTH_SECRET=5vjMEFsjPfvqqv8305UAgYrmainnBzaSCrReqMIOKFs= \
            -e "DATABASE_URL=postgres://postgres:mtaaBCMdq1yyV48K1b9N7bQr2HBgL0QPgLzXQ5JKKq2dHpzUF8CenMifnYGcfama@j1jerkqljysca3o9y3rdxojf:5432/postgres" \
            -e ADMIN_PHONE=09102413207 -e ADMIN_PASSWORD=Beewaz1403Admin \
            -e "ADMIN_NAME=مدیر سیستم" \
            -l "traefik.enable=true" \
            -l "traefik.http.middlewares.gzip.compress=true" \
            -l "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https" \
            -l "traefik.http.routers.http-0-${APP}.entryPoints=http" \
            -l "traefik.http.routers.http-0-${APP}.middlewares=redirect-to-https" \
            -l "traefik.http.routers.http-0-${APP}.rule=Host(\`bz360.ir\`) && PathPrefix(\`/\`)" \
            -l "traefik.http.routers.http-0-${APP}.service=http-0-${APP}" \
            -l "traefik.http.routers.https-0-${APP}.entryPoints=https" \
            -l "traefik.http.routers.https-0-${APP}.middlewares=gzip" \
            -l "traefik.http.routers.https-0-${APP}.rule=Host(\`bz360.ir\`) && PathPrefix(\`/\`)" \
            -l "traefik.http.routers.https-0-${APP}.service=https-0-${APP}" \
            -l "traefik.http.routers.https-0-${APP}.tls.certresolver=letsencrypt" \
            -l "traefik.http.routers.https-0-${APP}.tls=true" \
            -l "traefik.http.services.http-0-${APP}.loadbalancer.server.port=3000" \
            -l "traefik.http.services.https-0-${APP}.loadbalancer.server.port=3000" \
            beewaz-web:latest

          sleep 20
          docker inspect "$APP" --format='Status: {{.State.Status}}'
          docker logs "$APP" --tail=20 2>&1
          echo "=== DEPLOY COMPLETE ==="
          REMOTE
