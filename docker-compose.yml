services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: beewaz-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       beewaz
      POSTGRES_USER:     beewaz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beewaz -d beewaz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Next.js App ──────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://beewaz.ir}
    container_name: beewaz-app
    restart: unless-stopped
    environment:
      DATABASE_URL:          postgresql://beewaz:${POSTGRES_PASSWORD}@postgres:5432/beewaz
      AUTH_SECRET:           ${AUTH_SECRET}
      NEXTAUTH_URL:          ${NEXTAUTH_URL:-https://beewaz.ir}
      NEXT_PUBLIC_APP_URL:   ${NEXT_PUBLIC_APP_URL:-https://beewaz.ir}
      ADMIN_PHONE:           ${ADMIN_PHONE}
      ADMIN_PASSWORD:        ${ADMIN_PASSWORD}
      ADMIN_NAME:            ${ADMIN_NAME:-مدیر سیستم}
      NODE_ENV:              production
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
      - external

  # ── Nginx Reverse Proxy ──────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: beewaz-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - external

volumes:
  pgdata:
  nginx-logs:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
