services:

  postgres:
    image: postgres:16-alpine
    container_name: beewaz-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       beewaz
      POSTGRES_USER:     beewaz
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U beewaz -d beewaz"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
    container_name: beewaz-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL:          postgresql://beewaz:${POSTGRES_PASSWORD}@postgres:5432/beewaz
      AUTH_SECRET:           ${AUTH_SECRET}
      NEXTAUTH_URL:          ${NEXTAUTH_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL:   ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      ADMIN_PHONE:           ${ADMIN_PHONE}
      ADMIN_PASSWORD:        ${ADMIN_PASSWORD}
      ADMIN_NAME:            ${ADMIN_NAME:-مدیر سیستم}
      NODE_ENV:              production
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
